        target:
          entity_id: sensor.bb_active_timer_raw

automation:
  - alias: "Baby Buddy: Sync Active Timer to Dashboard"
    description: "Keeps HA helpers in sync with Baby Buddy's server timers."
    mode: restart
    trigger:
      - platform: state
        entity_id: sensor.bb_active_timer_raw
      - platform: time_pattern
        minutes: "/1"
    condition:
      - condition: template
        value_template: "{{ states('sensor.bb_active_timer_raw') not in ['unknown', 'unavailable'] }}"
      - condition: template
        value_template: >
          {{ (now() - states.input_select.bb_active_activity.last_updated).total_seconds() > 15 }}
    action:
      - choose:
          - conditions:
              - condition: numeric_state
                entity_id: sensor.bb_active_timer_raw
                above: 0
              - condition: state
                entity_id: input_select.bb_active_activity
                state: "none"
            sequence:
              - variables:
                  timer_data: "{{ state_attr('sensor.bb_active_timer_raw', 'results')[0] }}"
                  bb_start: "{{ as_datetime(timer_data.start).astimezone().strftime('%Y-%m-%d %H:%M:%S') }}"
              - action: input_select.select_option
                target:
                  entity_id: input_select.bb_active_activity
                data:
                  option: "Unknown"
              - action: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.bb_activity_start
                data:
                  datetime: "{{ bb_start }}"

          - conditions:
              - condition: numeric_state
                entity_id: sensor.bb_active_timer_raw
                above: 0
            sequence:
              - variables:
                  timer_data: "{{ state_attr('sensor.bb_active_timer_raw', 'results')[0] }}"
                  bb_start: "{{ as_datetime(timer_data.start).astimezone().strftime('%Y-%m-%d %H:%M:%S') }}"
              - condition: template
                value_template: >
                  {{ states('input_datetime.bb_activity_start') != bb_start }}
              - action: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.bb_activity_start
                data:
                  datetime: "{{ bb_start }}"

          - conditions:
              - condition: numeric_state
                entity_id: sensor.bb_active_timer_raw
                below: 1
              - condition: not
                conditions:
                  - condition: state
                    entity_id: input_select.bb_active_activity
                    state: "none"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.bb_active_activity
                data:
                  option: "none"
