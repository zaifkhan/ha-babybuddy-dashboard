      + ' cm' : '-'; ]]]
    styles:
      card:
        - border-radius: 16px
        - padding: 16px 8px
        - background: rgba(255,255,255,0.03)
        - box-shadow: none
      name:
        - font-size: 12px
        - opacity: 0.6
        - margin-bottom: 4px
      label:
        - font-size: 10px
        - opacity: 0.5
        - margin-top: 4px
      state:
        - font-size: 16px
        - font-weight: 600
      icon:
        - width: 24px
        - color: "#2E6D5D"
        - margin-bottom: 8px
  - type: custom:button-card
    entity: sensor.nil_tomris_ozsoy_last_head_circumference
    name: Head Circ
    icon: mdi:tape-measure
    show_state: true
    show_label: true
    label: >-
      [[[ let d = entity.attributes.date || entity.attributes.time ||
      entity.last_changed; return d ? new Date(d).toLocaleDateString(undefined,
      {month:'short', day:'numeric'}) : ''; ]]]
    state_display: >-
      [[[ return (entity.state && entity.state !== 'unavailable') ? entity.state
      + ' cm' : '-'; ]]]
    styles:
      card:
        - border-radius: 16px
        - padding: 16px 8px
        - background: rgba(255,255,255,0.03)
        - box-shadow: none
      name:
        - font-size: 12px
        - opacity: 0.6
        - margin-bottom: 4px
      label:
        - font-size: 10px
        - opacity: 0.5
        - margin-top: 4px
      state:
        - font-size: 16px
        - font-weight: 600
      icon:
        - width: 24px
        - color: "#A77B85"
        - margin-bottom: 8px
